<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PassGen - Random Password Generator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="index.css" rel="stylesheet">
</head>
<body>

  <div class="container hero">
    <div class="row justify-content-center">
      <div class="col-lg-8 text-center">
        
        <!-- Header -->
        <h1 class="title mb-3">
          Generate a <span class="highlight">random password</span>
        </h1>
        <p class="lead mb-5 text-light">
          Save your passwords, <br>
         Don't be like Mmekan!🥸
        </p>
        <!-- Main Generate Button -->
        <button id="generateBtn" onclick="generate()" class="btn btn-generate btn-lg mb-5">
          <i class="fas fa-dice me-2"></i> Generate Passwords
        </button>

        <!-- Password Display 
        <div class="mb-5">
          <div id="mainPassword" class="password-box fs-4 shadow-sm">
            Click "Generate Passwords" to start
          </div>
        </div> -->

        <!-- Examples -->
        <div class="row g-4 justify-content-center">
          <div class="col-md-5">
            <p class="example-label text-start">Click to copy password1</p>
            <div class="password-box" id="ex1"></div>
          </div>
          <div class="col-md-5">
            <p class="example-label text-start">Click to copy password2</p>
            <div class="password-box" id="ex2"></div>
          </div>
        </div>

        <div class="toggle-switch mb-5">
          <input type="checkbox" id="toggleSymbol" />
          <label for="toggleSymbol" class="switch-label">
            <span class="switch-slider"></span>
            <span class="switch-text">
              <i class="fas me-2"></i> include symbols
            </span>
          </label>
        </div>

        <div id="toast"></div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="index.js"></script>

</body>
</html>
